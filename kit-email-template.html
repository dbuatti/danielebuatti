<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daniele Buatti</title>
  <style type="text/css">
    /* FONTS */
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

    /* CLIENT-SPECIFIC STYLES */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    table { border-collapse: collapse !important; }
    body { height: 100% !important; margin: 0 !important; padding: 0 !important; width: 100% !important; font-family: 'Outfit', Helvetica, Arial, sans-serif; background-color: #F8F8F8; color: #00022D; }

    /* MOBILE STYLES */
    @media screen and (max-width: 600px) {
      .wrapper { width: 100% !important; max-width: 100% !important; }
      .content-padding { padding: 20px !important; }
      .logo { width: 180px !important; }
    }

    /* CUSTOM STYLES */
    a { color: #DB4CA3; text-decoration: none; font-weight: 600; }
    .button { background-color: #DB4CA3; color: #ffffff !important; padding: 14px 28px; border-radius: 50px; display: inline-block; font-weight: bold; text-align: center; }
    h1, h2, h3 { color: #00022D; margin-top: 0; }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #F8F8F8;">
  <center>
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #F8F8F8;">
      <tr>
        <td align="center" style="padding: 40px 0 20px 0;">
          <!-- LOGO SECTION -->
          <table border="0" cellpadding="0" cellspacing="0" width="600" class="wrapper">
            <tr>
              <td align="center">
                <a href="https://danielebuatti.com" target="_blank">
                  <img src="https://danielebuatti.com/blue-pink-ontrans.png" alt="Daniele Buatti" width="220" style="display: block; border: 0;" class="logo" />
                </a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
      <tr>
        <td align="center" style="padding-bottom: 40px;">
          <!-- MAIN CONTENT CARD -->
          <table border="0" cellpadding="0" cellspacing="0" width="600" class="wrapper" style="background-color: #ffffff; border-radius: 24px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
            <tr>
              <td class="content-padding" style="padding: 50px; font-size: 17px; line-height: 1.6; color: #00022D;">
                
                <!-- KIT CONTENT VARIABLE -->
                {{ message_content }}

              </td>
            </tr>
          </table>
        </td>
      </tr>
      <tr>
        <td align="center" style="padding-bottom: 60px;">
          <!-- FOOTER SECTION -->
          <table border="0" cellpadding="0" cellspacing="0" width="600" class="wrapper">
            <tr>
              <td align="center" style="padding: 0 20px; color: #00022D; font-size: 14px; line-height: 1.5; opacity: 0.7;">
                <img src="https://danielebuatti.com/logo-piano-white-44.png" alt="Brand Symbol" width="40" style="margin-bottom: 20px; filter: invert(1); opacity: 0.3;" />
                
                <p style="margin: 0 0 10px 0; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; font-size: 12px;">
                  Embodied Coaching for Performers & Communicators
                </p>
                
                <p style="margin: 0 0 20px 0;">
                  {{ address }}
                </p>
                
                <p style="margin: 0;">
                  <a href="{{ unsubscribe_url }}" style="color: #00022D; text-decoration: underline;">Unsubscribe</a> 
                  <span style="margin: 0 10px;">|</span>
                  <a href="{{ subscriber_preferences_url }}" style="color: #00022D; text-decoration: underline;">Update Preferences</a>
                </p>
                
                <p style="margin-top: 30px; font-size: 12px;">
                  &copy; 2025 Daniele Buatti. All rights reserved.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </center>
</body>
</html>
