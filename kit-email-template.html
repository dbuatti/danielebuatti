<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daniele Buatti</title>
  <style type="text/css">
    /* FONTS */
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

    /* CLIENT-SPECIFIC STYLES */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    table { border-collapse: collapse !important; }
    body { height: 100% !important; margin: 0 !important; padding: 0 !important; width: 100% !important; font-family: 'Outfit', Helvetica, Arial, sans-serif; background-color: #F8F8F8; color: #00022D; }

    /* MOBILE STYLES */
    @media screen and (max-width: 650px) {
      .wrapper { width: 100% !important; max-width: 100% !important; }
      .content-padding { padding: 30px 25px !important; }
      .logo-text { width: 180px !important; }
    }

    /* CUSTOM STYLES */
    a { color: #DB4CA3; text-decoration: none; font-weight: 600; }
    .button { background-color: #DB4CA3; color: #ffffff !important; padding: 14px 28px; border-radius: 50px; display: inline-block; font-weight: bold; text-align: center; }
    h1, h2, h3 { color: #00022D; margin-top: 0; }
    
    /* RESPONSIVE IMAGES IN CONTENT */
    .content-padding img {
      max-width: 100% !important;
      height: auto !important;
      display: block;
      margin: 24px auto;
      border-radius: 16px;
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #F8F8F8;">
  <center>
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #F8F8F8;">
      <tr>
        <td align="center" style="padding: 40px 0 30px 0;">
          <!-- HEADER TEXT LOGO -->
          <table border="0" cellpadding="0" cellspacing="0" width="650" class="wrapper">
            <tr>
              <td align="center">
                <a href="https://danielebuatti.com" target="_blank">
                  <img src="https://danielebuatti.com/logo-dark-blue-transparent-25.png" alt="Daniele Buatti" width="200" style="display: block; border: 0;" class="logo-text" />
                </a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
      <tr>
        <td align="center" style="padding-bottom: 40px;">
          <!-- MAIN CONTENT CARD -->
          <table border="0" cellpadding="0" cellspacing="0" width="650" class="wrapper" style="background-color: #ffffff; border-radius: 32px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.04);">
            <tr>
              <td class="content-padding" style="padding: 50px 60px 40px 60px; font-size: 17px; line-height: 1.7; color: #00022D;">
                
                <!-- KIT CONTENT VARIABLE -->
                {{ message_content }}

              </td>
            </tr>
            <tr>
              <td class="content-padding" style="padding: 0 60px 50px 60px;">
                <!-- SIGN-OFF SECTION -->
                <table border="0" cellpadding="0" cellspacing="0">
                  <tr>
                    <td width="70" align="left" style="padding-right: 15px;">
                      <img src="https://danielebuatti.com/daniele%20simple.jpeg" alt="Daniele" width="70" height="70" style="display: block; width: 70px; height: 70px; border-radius: 50%; border: 2px solid #ffffff; box-shadow: 0 4px 10px rgba(0,0,0,0.08);" />
                    </td>
                    <td align="left" style="vertical-align: middle;">
                      <p style="margin: 0; font-weight: 700; font-size: 18px; color: #00022D;">Daniele Buatti</p>
                      <p style="margin: 2px 0 0 0; font-size: 13px; color: #DB4CA3; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;">Pianist & Vocal Coach</p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
      <tr>
        <td align="center" style="padding-bottom: 60px;">
          <!-- FOOTER SECTION -->
          <table border="0" cellpadding="0" cellspacing="0" width="650" class="wrapper">
            <tr>
              <td align="center" style="padding: 0 20px; color: #00022D; font-size: 14px; line-height: 1.5; opacity: 0.8;">
                
                <!-- COLOR PIANO LOGO IN FOOTER -->
                <img src="https://danielebuatti.com/blue-pink-ontrans.png" alt="Daniele Buatti Logo" width="100" style="margin-bottom: 25px; display: block;" />
                
                <p style="margin: 0 0 10px 0; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; font-size: 11px; color: #DB4CA3;">
                  MUSIC DIRECTOR | VOICE COACH | PIANIST | ENTERTAINER
                </p>

                <!-- SOCIAL LINKS -->
                <p style="margin: 0 0 20px 0; font-size: 13px;">
                  <a href="https://instagram.com/daniele.buatti" target="_blank" style="color: #DB4CA3; text-decoration: none; margin: 0 8px;">Instagram</a>
                  <a href="http://youtube.com/danielebuatti" target="_blank" style="color: #DB4CA3; text-decoration: none; margin: 0 8px;">YouTube</a>
                  <a href="https://substack.com/@danielebuatti" target="_blank" style="color: #DB4CA3; text-decoration: none; margin: 0 8px;">Substack</a>
                  <a href="http://www.facebook.com/danielebuatti" target="_blank" style="color: #DB4CA3; text-decoration: none; margin: 0 8px;">Facebook</a>
                </p>
                
                <p style="margin: 0 0 20px 0; font-size: 13px;">
                  {{ address }}
                </p>
                
                <p style="margin: 0; font-size: 13px;">
                  <a href="{{ unsubscribe_url }}" style="color: #00022D; text-decoration: underline;">Unsubscribe</a> 
                  <span style="margin: 0 10px; opacity: 0.3;">|</span>
                  <a href="{{ subscriber_preferences_url }}" style="color: #00022D; text-decoration: underline;">Update Preferences</a>
                </p>
                
                <p style="margin-top: 30px; font-size: 11px; opacity: 0.5;">
                  &copy; 2025 Daniele Buatti. All rights reserved.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </center>
</body>
</html>
